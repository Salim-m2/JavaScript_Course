<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="proj.css">
    <script defer src="proj.js"></script>
</head>
<body>
    <div class="main">
        <div class="container">
            <h2>Rock Paper Scissors Game</h2>
            <h3 class="display" id="displayresult"></h3> 
            <form action="">
                <label for="input"><h3>Please enter rock, paper or scissors.</h3></label>
                <input type="text" id="input">
                <button id="playbutton">Play</button>
            </form>
            <p class="display" id="displaychoices"></p>
        </div>
    </div>

</body>
</html>
