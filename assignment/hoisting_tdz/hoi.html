    <h2>Hoisting and Temporal Dead Zone In JavaScript</h2>
    <p><b>Hoisting:</b> <i>Is using the variable before actually declaring it.</i></p>
    <p><b>Temporal Dead Zone:</b><i> Is a place where the variable is being tried to be accessed before declaring it.</i></p>
